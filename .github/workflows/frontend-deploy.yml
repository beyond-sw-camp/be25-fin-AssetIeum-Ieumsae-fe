name: Frontend Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: frontend-deploy
  cancel-in-progress: true

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-northeast-2' }}
  NODE_VERSION: ${{ vars.NODE_VERSION || '24' }}
  VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || '/api/v1' }}
  VITE_SSE_BASE_URL: ${{ vars.VITE_SSE_BASE_URL || '/api/v1' }}
  VITE_USE_MOCKS: 'false'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Build
        run: npm run build

  deploy-s3-cloudfront:
    name: Deploy to S3 and CloudFront
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read

    env:
      S3_BUCKET: ${{ vars.S3_BUCKET }}
      CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy configuration
        run: |
          set -eu

          if [ -z "$S3_BUCKET" ]; then
            echo "Missing GitHub variable: S3_BUCKET"
            exit 1
          fi

          if [ -z "$CLOUDFRONT_DISTRIBUTION_ID" ]; then
            echo "Missing GitHub variable: CLOUDFRONT_DISTRIBUTION_ID"
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload hashed assets
        run: |
          if [ -d dist/assets ]; then
            aws s3 sync dist/assets "s3://$S3_BUCKET/assets" \
              --delete \
              --cache-control "public,max-age=31536000,immutable"
          fi

      - name: Upload entry and public files
        run: |
          aws s3 sync dist "s3://$S3_BUCKET" \
            --delete \
            --exclude "assets/*" \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" \
            --paths "/*"
